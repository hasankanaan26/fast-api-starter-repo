<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Assistant</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Task Assistant</h1>
      <div class="api-status" id="api-status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">checking API…</span>
      </div>
    </header>

    <!-- Tab navigation -->
    <nav class="tabs">
      <button class="tab active" data-tab="tasks">Tasks</button>
      <button class="tab" data-tab="analysis">Document Analysis</button>
    </nav>

    <!-- TAB 1: Task Management (existing) -->
    <main class="layout tab-content active" id="tab-tasks">
      <!-- LEFT: Assignees -->
      <section class="card">
        <div class="card-header">
          <h2>People</h2>
          <span class="count" id="assignee-count">0</span>
        </div>

        <form id="assignee-form" class="stacked-form">
          <label>
            Name
            <input id="assignee-name" type="text" placeholder="Jane Doe" required />
          </label>
          <label>
            Email
            <input id="assignee-email" type="email" placeholder="jane@example.com" required />
          </label>
          <button type="submit" class="primary">Add person</button>
        </form>

        <ul id="assignee-list" class="list"></ul>
      </section>

      <!-- RIGHT: Tasks -->
      <section class="card wide">
        <div class="card-header">
          <h2>Tasks</h2>
          <span class="count" id="task-count">0</span>
        </div>

        <form id="task-form" class="stacked-form">
          <label>
            Title
            <input id="task-title" type="text" placeholder="Buy groceries" required />
          </label>
          <label>
            Description
            <textarea id="task-description" rows="2" placeholder="Optional details…"></textarea>
          </label>
          <label>
            Assign to
            <select id="task-assignee">
              <option value="">— Unassigned —</option>
            </select>
          </label>
          <button type="submit" class="primary">Create task</button>
        </form>

        <div class="filter-row">
          <input id="task-search" type="search" placeholder="Search tasks…" />
          <select id="task-filter-assignee">
            <option value="">All people</option>
          </select>
        </div>

        <ul id="task-list" class="list"></ul>
      </section>
    </main>

    <!-- TAB 2: Document Analysis (new) -->
    <main class="analysis-layout tab-content" id="tab-analysis">
      <!-- LEFT: Input panel -->
      <section class="card">
        <div class="card-header">
          <h2>Analyze Document</h2>
        </div>

        <form id="analysis-form" class="stacked-form">
          <label>
            Paste your text
            <textarea id="analysis-text" rows="8" placeholder="Paste a support ticket, bug report, feature request, billing complaint, or any text you want to analyze…" required></textarea>
          </label>

          <label>
            Analysis type
            <select id="analysis-type">
              <option value="pipeline">Full Pipeline (classify + extract + summarize)</option>
              <option value="sentiment">Sentiment Analysis</option>
              <option value="summarize">Summarize</option>
              <option value="classify">Classify Ticket</option>
            </select>
          </label>

          <div id="summarize-options" class="sub-options" hidden>
            <label>
              Max sentences
              <input id="analysis-max-sentences" type="number" value="3" min="1" max="10" />
            </label>
          </div>

          <button type="submit" class="primary" id="analyze-btn">Analyze</button>
        </form>

        <!-- Example texts for quick testing -->
        <div class="examples">
          <p class="examples-label">Try an example:</p>
          <button class="ghost example-btn" data-example="bug">Bug report</button>
          <button class="ghost example-btn" data-example="feature">Feature request</button>
          <button class="ghost example-btn" data-example="billing">Billing issue</button>
          <button class="ghost example-btn" data-example="praise">Praise</button>
        </div>
      </section>

      <!-- RIGHT: Results panel -->
      <section class="card wide">
        <div class="card-header">
          <h2>Results</h2>
          <span class="count" id="analysis-status"></span>
        </div>

        <div id="analysis-results" class="results-area">
          <div class="empty">Submit text on the left to see analysis results here.</div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script src="app.js"></script>
  </body>
</html>
